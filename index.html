<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewellery Test Report ERP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 28px;
        }
        
        .header-buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: white;
            color: #667eea;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
            .header-content {
                flex-direction: column;
                gap: 20px;
            }
            .header-buttons {
                flex-wrap: wrap;
            }
        }
        
        .card-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .card-section h2 {
            font-size: 22px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .image-upload {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }
        
        .image-upload:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }
        
        .image-upload input {
            display: none;
        }
        
        .image-preview {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .form-buttons button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-save {
            background: #667eea;
            color: white;
        }
        
        .btn-save:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-publish {
            background: #4caf50;
            color: white;
        }
        
        .btn-publish:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }
        
        .btn-delete {
            background: #f44336;
            color: white;
        }
        
        .btn-delete:hover {
            background: #da190b;
        }
        
        .cards-list {
            display: grid;
            gap: 15px;
        }
        
        .card-item {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .card-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .card-item.published {
            border-left-color: #4caf50;
        }
        
        .card-info {
            flex: 1;
        }
        
        .card-info h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .card-info p {
            color: #666;
            font-size: 13px;
        }
        
        .card-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .card-status.draft {
            background: #fff3cd;
            color: #856404;
        }
        
        .card-status.published {
            background: #d4edda;
            color: #155724;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
        }
        
        .card-actions button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        .action-preview {
            background: #667eea;
            color: white;
        }
        
        .action-preview:hover {
            background: #5568d3;
        }
        
        .action-print {
            background: #2196F3;
            color: white;
        }
        
        .action-print:hover {
            background: #0b7dda;
        }
        
        .action-delete {
            background: #f44336;
            color: white;
        }
        
        .action-delete:hover {
            background: #da190b;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 15px;
            max-width: 900px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 20px;
        }
        
        .pvc-card {
            width: 85.6mm;
            height: 54mm;
            background: linear-gradient(135deg, #f0f0f0 0%, #ffffff 100%);
            padding: 8mm;
            border-radius: 4mm;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-family: 'Arial', sans-serif;
            position: relative;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8mm;
            overflow: hidden;
        }
        
        .pvc-header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5mm;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5mm;
        }
        
        .pvc-logo {
            font-weight: bold;
            font-size: 12px;
            color: #667eea;
        }
        
        .pvc-cert {
            font-weight: bold;
            font-size: 11px;
            color: #333;
        }
        
        .pvc-left {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .pvc-left h3 {
            font-size: 10px;
            color: #667eea;
            margin-bottom: 3mm;
        }
        
        .pvc-left p {
            font-size: 8px;
            color: #666;
            line-height: 1.3;
            margin-bottom: 2mm;
        }
        
        .pvc-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }
        
        .pvc-qr {
            width: 15mm;
            height: 15mm;
            background: white;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .pvc-image {
            width: 100%;
            height: 12mm;
            object-fit: cover;
            border-radius: 2mm;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            padding: 20px;
            justify-content: center;
            border-top: 1px solid #e0e0e0;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.active {
            display: block;
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div>
                <h1>✨ Jewellery Test Report ERP</h1>
                <p style="margin-top: 5px; opacity: 0.9;">Professional Certification Card Management System</p>
            </div>
            <div class="header-buttons">
                <button class="btn btn-secondary" onclick="loadCards()">
                    <i class="fas fa-sync"></i> Refresh
                </button>
                <button class="btn btn-primary" onclick="showAddForm()">
                    <i class="fas fa-plus"></i> Add New Card
                </button>
                <button class="btn btn-secondary" onclick="exportExcel()">
                    <i class="fas fa-download"></i> Export
                </button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="content">
            <!-- Form Section -->
            <div class="card-section">
                <h2><i class="fas fa-form"></i> Certification Details</h2>
                
                <div id="alert" class="alert"></div>
                
                <form id="cardForm">
                    <div class="form-group">
                        <label>Job Number</label>
                        <input type="text" id="jobNumber" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>Certification Number</label>
                        <input type="text" id="certNumber" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>Customer Name *</label>
                        <input type="text" id="customerName" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" placeholder="Product description..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Product Type / Shape</label>
                        <select id="productType">
                            <option value="">Select Type</option>
                            <option value="Ring">Ring</option>
                            <option value="Pendant">Pendant</option>
                            <option value="Bracelet">Bracelet</option>
                            <option value="Earring">Earring</option>
                            <option value="Necklace">Necklace</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Weight / Carat</label>
                        <input type="text" id="weight" placeholder="e.g., 10.5 ct">
                    </div>
                    
                    <div class="form-group">
                        <label>Colour</label>
                        <input type="text" id="colour" placeholder="e.g., Yellow Gold">
                    </div>
                    
                    <div class="form-group">
                        <label>Clarity</label>
                        <input type="text" id="clarity" placeholder="e.g., VVS1">
                    </div>
                    
                    <div class="form-group">
                        <label>Comments</label>
                        <textarea id="comments" placeholder="Additional comments..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Product Image</label>
                        <div class="image-upload" onclick="document.getElementById('imageFile').click()">
                            <i class="fas fa-cloud-upload-alt" style="font-size: 30px; color: #667eea; margin-bottom: 10px; display: block;"></i>
                            <p>Click to upload or drag and drop</p>
                            <small style="color: #999;">PNG, JPG, GIF up to 10MB</small>
                            <input type="file" id="imageFile" accept="image/*">
                            <img id="imagePreview" class="image-preview" style="display: none;">
                        </div>
                    </div>
                    
                    <div class="form-buttons">
                        <button type="button" class="btn-save" onclick="saveCard()">
                            <i class="fas fa-save"></i> Save Card
                        </button>
                        <button type="button" class="btn-publish" onclick="publishCard()">
                            <i class="fas fa-check"></i> Publish Card
                        </button>
                        <button type="button" class="btn-delete" onclick="clearForm()">
                            <i class="fas fa-trash"></i> Clear
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Cards List Section -->
            <div class="card-section">
                <h2><i class="fas fa-list"></i> All Cards</h2>
                <div class="cards-list" id="cardsList"></div>
            </div>
        </div>
    </div>
    
    <!-- Preview Modal -->
    <div id="previewModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="cardPreview" class="pvc-card">
                <div class="pvc-header">
                    <div class="pvc-logo">JEWELLERY CERTIFIED</div>
                    <div class="pvc-cert" id="previewCertNum"></div>
                </div>
                <div class="pvc-left">
                    <div>
                        <h3>SPECIFICATIONS</h3>
                        <p><strong>Type:</strong> <span id="previewType">-</span></p>
                        <p><strong>Weight:</strong> <span id="previewWeight">-</span></p>
                        <p><strong>Colour:</strong> <span id="previewColour">-</span></p>
                        <p><strong>Clarity:</strong> <span id="previewClarity">-</span></p>
                        <p id="previewDesc" style="font-size: 7px; color: #999; margin-top: 3mm;"></p>
                    </div>
                </div>
                <div class="pvc-right">
                    <div class="pvc-qr" id="previewQR"></div>
                    <img id="previewImage" class="pvc-image" src="">
                </div>
            </div>
            
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="printCard()">
                    <i class="fas fa-print"></i> Print
                </button>
                <button class="btn btn-secondary" onclick="savePDF()">
                    <i class="fas fa-file-pdf"></i> Save PDF
                </button>
                <button class="btn btn-secondary" onclick="closeModal()">
                    <i class="fas fa-times"></i> Close
                </button>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        const API_BASE = './api/';
        let currentCard = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            generateNewCard();
            loadCards();
            
            // Image preview
            document.getElementById('imageFile').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const preview = document.getElementById('imagePreview');
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            });
        });
        
        function generateNewCard() {
            const now = new Date();
            const dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
            const rand = Math.random().toString(36).substring(2, 7).toUpperCase();
            
            document.getElementById('jobNumber').value = 'JOB-' + dateStr + '-' + rand;
            document.getElementById('certNumber').value = 'CERT-' + dateStr + '-' + rand;
        }
        
        function showAddForm() {
            clearForm();
            generateNewCard();
            document.getElementById('cardForm').scrollIntoView({ behavior: 'smooth' });
        }
        
        function clearForm() {
            document.getElementById('cardForm').reset();
            generateNewCard();
            document.getElementById('imagePreview').style.display = 'none';
            currentCard = null;
        }
        
        function showAlert(message, type = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert show ' + type;
            setTimeout(() => alert.classList.remove('show'), 3000);
        }
        
        function saveCard() {
            const formData = new FormData();
            formData.append('job_number', document.getElementById('jobNumber').value);
            formData.append('cert_number', document.getElementById('certNumber').value);
            formData.append('customer_name', document.getElementById('customerName').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('product_type', document.getElementById('productType').value);
            formData.append('weight', document.getElementById('weight').value);
            formData.append('colour', document.getElementById('colour').value);
            formData.append('clarity', document.getElementById('clarity').value);
            formData.append('comments', document.getElementById('comments').value);
            formData.append('image', document.getElementById('imageFile').files[0]);
            formData.append('status', 'draft');
            
            fetch(API_BASE + 'save-card.php', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showAlert('Card saved successfully!', 'success');
                    currentCard = data.card;
                    loadCards();
                } else {
                    showAlert('Error: ' + data.message, 'error');
                }
            })
            .catch(e => showAlert('Error: ' + e.message, 'error'));
        }
        
        function publishCard() {
            if (!currentCard) {
                showAlert('Please save the card first', 'error');
                return;
            }
            
            fetch(API_BASE + 'publish-card.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: currentCard.id })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showAlert('Card published! Click preview to see it.', 'success');
                    currentCard = data.card;
                    loadCards();
                } else {
                    showAlert('Error: ' + data.message, 'error');
                }
            })
            .catch(e => showAlert('Error: ' + e.message, 'error'));
        }
        
        function loadCards() {
            fetch(API_BASE + 'get-cards.php')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('cardsList');
                list.innerHTML = '';
                
                if (!data.cards || data.cards.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: #999;">No cards yet. Create your first card!</p>';
                    return;
                }
                
                data.cards.forEach(card => {
                    const status = card.status || 'draft';
                    const item = document.createElement('div');
                    item.className = 'card-item ' + status;
                    item.innerHTML = `
                        <div class="card-info">
                            <span class="card-status ${status}">${status.toUpperCase()}</span>
                            <h3>${card.cert_number}</h3>
                            <p><strong>${card.customer_name}</strong></p>
                            <p>${card.product_type || 'N/A'} • ${card.weight || 'N/A'}</p>
                            <p style="font-size: 12px; color: #999;">Created: ${new Date(card.created_at).toLocaleDateString()}</p>
                        </div>
                        <div class="card-actions">
                            ${status === 'published' ? `<button class="action-preview" onclick="previewCard(${card.id})"><i class="fas fa-eye"></i> Preview</button>` : ''}
                            <button class="action-delete" onclick="deleteCard(${card.id})"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    `;
                    list.appendChild(item);
                });
            })
            .catch(e => showAlert('Error loading cards: ' + e.message, 'error'));
        }
        
        function previewCard(id) {
            fetch(API_BASE + 'get-card.php?id=' + id)
            .then(r => r.json())
            .then(data => {
                if (data.card) {
                    const card = data.card;
                    document.getElementById('previewCertNum').textContent = card.cert_number;
                    document.getElementById('previewType').textContent = card.product_type || '-';
                    document.getElementById('previewWeight').textContent = card.weight || '-';
                    document.getElementById('previewColour').textContent = card.colour || '-';
                    document.getElementById('previewClarity').textContent = card.clarity || '-';
                    document.getElementById('previewDesc').textContent = card.description || '';
                    
                    if (card.image_path) {
                        document.getElementById('previewImage').src = card.image_path;
                    }
                    
                    // Generate QR Code
                    const qrContainer = document.getElementById('previewQR');
                    qrContainer.innerHTML = '';
                    new QRCode(qrContainer, {
                        text: 'verify.php?cert_id=' + card.cert_number,
                        width: 100,
                        height: 100,
                        colorDark: '#000000',
                        colorLight: '#ffffff'
                    });
                    
                    currentCard = card;
                    document.getElementById('previewModal').classList.add('active');
                } else {
                    showAlert('Card not found', 'error');
                }
            })
            .catch(e => showAlert('Error: ' + e.message, 'error'));
        }
        
        function closeModal() {
            document.getElementById('previewModal').classList.remove('active');
        }
        
        function printCard() {
            window.print();
        }
        
        function savePDF() {
            const element = document.getElementById('cardPreview');
            const opt = {
                margin: 0,
                filename: (currentCard?.cert_number || 'card') + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: [85.6, 54], orientation: 'landscape' }
            };
            html2pdf().set(opt).from(element).save();
        }
        
        function deleteCard(id) {
            if (!confirm('Are you sure you want to delete this card?')) return;
            
            fetch(API_BASE + 'delete-card.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showAlert('Card deleted!', 'success');
                    loadCards();
                } else {
                    showAlert('Error: ' + data.message, 'error');
                }
            })
            .catch(e => showAlert('Error: ' + e.message, 'error'));
        }
        
        function exportExcel() {
            window.location.href = API_BASE + 'export-excel.php';
        }
    </script>
</body>
</html>
